name: Daily Data Update

on:
  schedule:
    - cron: '15 2 * * *'   # 8:00 AM Nepal Time (NPT = UTC+5:45) = 02:15 UTC
  workflow_dispatch:         # allows manual trigger from GitHub UI anytime

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome and ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          chromedriver --version
          chromium-browser --version

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run updater script
        run: python updater.py

      - name: Commit and push updated Excel
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fiscal_dashboard_data.xlsx
          git diff --staged --quiet || git commit -m "Auto-update: data for $(date +'%Y-%m-%d')"
          git push
